<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyberpunk HoloCall - Pro Edition</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="ui-container">
        
        <div id="incoming-call" class="module hidden">
            <div class="incoming-wrapper">
                <div class="glitch-effect">INCOMING CALL...</div>
                <div class="caller-name" id="caller-name">UNKNOWN ID</div>
                <div class="actions">
                    <button id="btn-accept" class="cyber-button accept-btn">ACCEPTER</button>
                    <button id="btn-decline" class="cyber-button decline-btn">REFUSER</button>
                </div>
            </div>
        </div>

        <div id="holo-active" class="module hidden">
            <div class="holo-wrapper">
                <div class="scanlines"></div>
                <div class="cyber-grid"></div>
                
                <div class="holo-frame">
                    <div class="hud-top-left">SYS.VER // 2.0.77</div>
                    <div class="hud-top-right">UPLINK_SECURE</div>
                    
                    <div class="holo-header">
                        <span class="cyber-text glitch-text" data-text="LINK_ESTABLISHED">LINK_ESTABLISHED</span>
                        <div class="timer-container">
                            <span class="timer-label">DUR.</span>
                            <span class="timer cp-yellow" id="call-timer">00:00</span>
                        </div>
                    </div>

                    <div class="holo-center-display">
                        <div class="target-bracket top-left"></div>
                        <div class="target-bracket bottom-right"></div>
                        
                        <div class="voice-visualizer">
                            <div class="bar"></div>
                            <div class="bar"></div>
                            <div class="bar"></div>
                            <div class="bar"></div>
                            <div class="bar"></div>
                            <div class="bar"></div>
                            <div class="bar"></div>
                        </div>
                        <div class="holo-status">TRANSMISSION AUDIO_</div>
                    </div>

                    <div class="holo-footer">
                        <div class="data-stream">0x7F4B92... AUTHENTICATED</div>
                        <button id="btn-end" class="cyber-button end-btn cp-end-btn">
                            <span class="btn-glitch-layer"></span>
                            DÉCONNECTER
                        </button>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
